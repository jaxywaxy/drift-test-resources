name: Deploy Bicep Resources

on:
  push:
    branches:
      - main
    paths:
      - 'bicep/**'
      - '.github/workflows/deploy-bicep-resources.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: drift-test-resources-${{ github.event.inputs.environment || 'dev' }}
  LOCATION: australiaeast

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Bicep Files
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/setup-cli@v3

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          echo "Validating Bicep files..."
          for file in bicep/*.bicep; do
            if [[ "$file" != *"main.bicep" ]] && [[ "$file" != *"main-simple.bicep" ]]; then
              echo "Validating $file"
              az bicep build --file "$file" --stdout > /dev/null
            fi
          done
          echo "Validating main Bicep file..."
          az bicep build --file bicep/main.bicep --stdout > /dev/null

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Resources
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/setup-cli@v3

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.LOCATION }}" || true

      - name: Deploy Bicep resources
        run: |
          echo "Deploying Bicep resources from $PWD/bicep/main.bicep"
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file bicep/main.bicep \
            --parameters \
              environment=${{ github.event.inputs.environment || 'dev' }} \
              location=${{ env.LOCATION }}
        continue-on-error: true

      - name: Output deployment results
        if: always()
        run: |
          echo "Deployment completed. Checking deployed resources..."
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --output table

  cleanup-on-pr:
    runs-on: ubuntu-latest
    name: Cleanup PR Resources
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/setup-cli@v3

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Delete PR resource group
        run: |
          RESOURCE_GROUP_PR="drift-test-resources-pr-${{ github.event.pull_request.number }}"
          echo "Cleaning up resources from PR #${{ github.event.pull_request.number }}"
          az group delete --name "$RESOURCE_GROUP_PR" --yes || true
