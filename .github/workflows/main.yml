name: Deploy Bicep Resources (multi-env, manual)

# Manual-only: this workflow and drift-lz-deploy.yml both used to trigger on
# push to main, double-deploying every bicep merge into two DIFFERENT resource
# groups (drift-test-resources-dev AND drift-test-resources-test) - the source
# of the stray-RG confusion. drift-lz-deploy.yml owns the push trigger and the
# canonical rg-drift-test estate; use this one only for ad-hoc env copies.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: drift-test-resources-${{ github.event.inputs.environment || 'dev' }}
  LOCATION: australiaeast

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Bicep Files
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/setup-cli@v3

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          echo "Validating Bicep files..."
          for file in bicep/*.bicep; do
            if [[ "$file" != *"main.bicep" ]] && [[ "$file" != *"main-simple.bicep" ]]; then
              echo "Validating $file"
              az bicep build --file "$file" --stdout > /dev/null
            fi
          done
          echo "Validating main Bicep file..."
          az bicep build --file bicep/main.bicep --stdout > /dev/null

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Resources
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/setup-cli@v3

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.LOCATION }}" || true

      - name: Deploy Bicep resources
        run: |
          echo "Deploying Bicep resources from $PWD/bicep/main.bicep"
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file bicep/main.bicep \
            --parameters \
              environment=${{ github.event.inputs.environment || 'dev' }} \
              location=${{ env.LOCATION }}
        continue-on-error: true

      - name: Output deployment results
        if: always()
        run: |
          echo "Deployment completed. Checking deployed resources..."
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --output table
