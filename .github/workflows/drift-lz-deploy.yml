name: Deploy Bicep Resources

on:
  push:
    branches:
      - main
    paths:
      - 'bicep/**'
      - '.github/workflows/deploy-bicep-resources.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'bicep/**'
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # Must match resource_groups in .github/drift-lz-config.yml - the drift scan
  # compares this template against THIS resource group. uniqueString-derived
  # resource names also seed from the RG name, so moving RGs renames everything.
  RESOURCE_GROUP: rg-drift-test
  LOCATION: australiaeast

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Bicep Files
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: |
          echo "Validating Bicep files..."
          for file in bicep/*.bicep; do
            if [[ "$file" != *"main.bicep" ]] && [[ "$file" != *"main-simple.bicep" ]]; then
              echo "Validating $file"
              az bicep build --file "$file" --stdout > /dev/null
            fi
          done
          echo "Validating main Bicep file..."
          az bicep build --file bicep/main.bicep --stdout > /dev/null

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Resources
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.LOCATION }}" || true

      - name: Recover soft-deleted resources
        run: |
          # A previous teardown leaves soft-deleted shells that block preflight
          # (FlagMustBeSetForRestore). AI/Cognitive accounts can be purged; the
          # Key Vault has purge protection, so it must be RECOVERED instead and
          # the deployment then updates it in place.
          for name in $(az cognitiveservices account list-deleted \
              --query "[?contains(id, '/resourceGroups/${{ env.RESOURCE_GROUP }}/')].name" -o tsv); do
            echo "Purging soft-deleted Cognitive Services account: $name"
            az cognitiveservices account purge \
              --name "$name" --location "${{ env.LOCATION }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" || true
          done
          for name in $(az keyvault list-deleted \
              --query "[?contains(properties.vaultId, '/resourceGroups/${{ env.RESOURCE_GROUP }}/')].name" -o tsv); do
            echo "Recovering soft-deleted (purge-protected) Key Vault: $name"
            az keyvault recover --name "$name" || true
          done

      - name: Deploy Bicep resources
        run: |
          echo "Deploying Bicep resources from $PWD/bicep/main.bicep"
          deploy() {
            az deployment group create \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --template-file bicep/main.bicep \
              --parameters \
                environment=test \
                location=${{ env.LOCATION }}
          }
          # A fresh Log Analytics workspace races the DCR (InvalidOutputTable
          # "Microsoft-Perf not available"); a single rerun heals it. Real
          # failures still fail the workflow (no continue-on-error).
          deploy || { echo "Deployment failed; retrying once (DCR/LA race heals on rerun)..."; sleep 60; deploy; }

      - name: Output deployment results
        if: always()
        run: |
          echo "Deployment completed. Checking deployed resources..."
          az resource list --resource-group "${{ env.RESOURCE_GROUP }}" --output table

  cleanup-on-pr:
    runs-on: ubuntu-latest
    name: Cleanup PR Resources
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Delete PR resource group
        run: |
          RESOURCE_GROUP_PR="drift-test-resources-pr-${{ github.event.pull_request.number }}"
          echo "Cleaning up resources from PR #${{ github.event.pull_request.number }}"
          az group delete --name "$RESOURCE_GROUP_PR" --yes || true
