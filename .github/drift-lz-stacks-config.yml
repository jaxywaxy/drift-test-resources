name: test-stack-resources
subscription_id: "594e0bd0-2a8d-4419-b281-87869c20fd03"

# Owner-routed notifications: platform-owned drift (network fabric - VNets,
# NSGs, route tables, firewall policies + their rule collection groups) goes to
# the platform channel; workload drift goes to the app-team channel. Each team's
# `owners` filter admits only its own drift; secret refs (${DRIFT_WEBHOOK_*}) are
# expanded by the agent at send time.
notifications:
  platform:
    slack: "${DRIFT_WEBHOOK_PLATFORM}"
    owners: [platform]
    filter: all  # Options: all, drift, extra, missing
  workload:
    slack: "${DRIFT_WEBHOOK_WORKLOAD}"
    owners: [workload]
    filter: all

checks:
  - name: Test Stack Infrastructure
    repo: jaxywaxy/drift-test-resources
    branch: main
    path: bicep/test-stack/main.bicep
    resource_groups:
      - drift-test-rg-deploy
    # Deployment stack drift. `expect` is what makes the enforcement posture
    # checkable at all: a stack records nothing about what it was SUPPOSED to
    # be, so anything not declared here is never asserted, and the live values
    # are deliberately not used as a baseline. Ownership and stack health are
    # checked with or without this block.
    deployment_stack:
      name: test-stack
      scope: resource_group
      expect:
        deny_settings:
          mode: denyWriteAndDelete
          apply_to_child_scopes: true
          excluded_principals: []
          excluded_actions: []
        action_on_unmanage:
          resources: delete
          resource_groups: delete
